# render.yaml
# Blueprint: Rails + Postgres (Free) for short-term demo

databases:
  - name: creatordock-db
    plan: free
    databaseName: creatordock_production
    user: creatordock
    # region: oregon   # 可选：你可以改成离你更近的 region

services:
  - type: web
    name: creatordock
    plan: free
    runtime: ruby
    # region: Singapore
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec rails server -b 0.0.0.0 -p $PORT

    envVars:
      - key: RAILS_ENV
        value: production

      # Rails encrypted credentials (DO NOT commit config/master.key)
      - key: RAILS_MASTER_KEY
        sync: false

      # Render will inject this from the DB defined above
      - key: DATABASE_URL
        fromDatabase:
          name: creatordock-db
          property: connectionString

      # Recommended for Rails on Render
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: WEB_CONCURRENCY
        value: "2"

      # Optional: only enable if you want to auto-seed during build (and seeds are idempotent)
      - key: RUN_SEEDS
        value: "false"